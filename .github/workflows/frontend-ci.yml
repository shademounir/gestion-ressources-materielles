name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - develop
      - main
    paths:
      - "frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --workspace frontend

      - name: Typecheck
        run: npm run typecheck --workspace frontend

      - name: Test
        run: npm run test --workspace frontend

      - name: Build
        run: npm run build --workspace frontend
